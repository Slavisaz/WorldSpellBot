<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldSpellBot 🌍</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WorldSpellBot">
<meta name="theme-color" content="#6366f1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #fff8f0;
  --card: #ffffff;
  --text: #1a1a2e;
  --muted: #7c7c9a;
  --accent1: #ff6b6b;
  --accent2: #ffd93d;
  --accent3: #6bcb77;
  --accent4: #4d96ff;
  --accent5: #c77dff;
  --shadow: rgba(0,0,0,0.10);
  --radius: 24px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 12px 60px;
  background-image:
    radial-gradient(circle at 10% 10%, #ffe0e055 0%, transparent 40%),
    radial-gradient(circle at 90% 5%,  #c8f7dc55 0%, transparent 35%),
    radial-gradient(circle at 85% 90%, #d0e8ff55 0%, transparent 40%),
    radial-gradient(circle at 5%  90%, #fff3c455 0%, transparent 35%);
  overflow-x: hidden;
}

/* ─── HEADER ─────────────────────────────────── */
header {
  text-align: center;
  margin-bottom: 14px;
  animation: floatIn 0.7s ease;
}
.logo {
  font-family: 'Baloo 2', cursive;
  font-size: clamp(2.2rem, 7vw, 3.6rem);
  font-weight: 800;
  background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #c77dff);
  background-size: 300% 300%;
  animation: gradientShift 4s ease infinite;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.1;
  filter: drop-shadow(2px 3px 0 rgba(0,0,0,0.08));
}
@keyframes gradientShift {
  0%,100% { background-position: 0% 50%; }
  50%      { background-position: 100% 50%; }
}
.tagline {
  font-size: 0.9rem;
  color: var(--muted);
  font-weight: 700;
  margin-top: 2px;
  letter-spacing: 0.02em;
}

/* ─── LANGUAGE SELECTOR ─────────────────────── */
.lang-section {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  animation: floatIn 0.8s ease 0.1s backwards;
  flex-wrap: wrap;
  justify-content: center;
}

.lang-en-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 10px 22px;
  border-radius: 50px;
  border: none;
  background: linear-gradient(135deg, #4d96ff, #6bcb77);
  color: white;
  font-family: 'Nunito', sans-serif;
  font-size: 0.95rem;
  font-weight: 800;
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(77,150,255,0.35);
  transition: all 0.25s;
  white-space: nowrap;
}
.lang-en-btn:hover { transform: translateY(-2px) scale(1.04); }
.lang-en-btn.active {
  background: linear-gradient(135deg, #ff6b6b, #ffd93d);
  box-shadow: 0 4px 18px rgba(255,107,107,0.4);
  transform: scale(1.06);
}

.globe-dropdown-wrap { position: relative; }

.globe-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  border-radius: 50px;
  border: 2.5px solid #e2e8f0;
  background: white;
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  font-size: 0.95rem;
  font-weight: 800;
  cursor: pointer;
  box-shadow: 0 4px 16px var(--shadow);
  transition: all 0.25s;
  white-space: nowrap;
  min-width: 200px;
  justify-content: space-between;
}
.globe-btn:hover { border-color: #c77dff; box-shadow: 0 6px 20px rgba(199,125,255,0.25); }
.globe-btn.open  { border-color: #c77dff; background: #fdf4ff; }
.globe-btn .globe-icon { font-size: 1.3rem; }
.globe-btn .arrow { font-size: 0.7rem; transition: transform 0.3s; color: var(--muted); }
.globe-btn.open .arrow { transform: rotate(180deg); }
.globe-btn .selected-lang { flex: 1; text-align: left; margin-left: 4px; }

.lang-dropdown {
  position: absolute;
  top: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%) scaleY(0.8);
  transform-origin: top center;
  background: white;
  border-radius: 20px;
  box-shadow: 0 12px 50px rgba(0,0,0,0.18);
  padding: 8px;
  min-width: 220px;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
  border: 2px solid #f1f5f9;
}
.lang-dropdown.open {
  opacity: 1;
  pointer-events: all;
  transform: translateX(-50%) scaleY(1);
}
.lang-option {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: 14px;
  cursor: pointer;
  font-weight: 700;
  font-size: 0.9rem;
  transition: all 0.18s;
  color: var(--text);
}
.lang-option:hover { background: #f8f0ff; color: #c77dff; transform: translateX(4px); }
.lang-option.selected { background: linear-gradient(135deg, #f8f0ff, #e8f4ff); color: #6366f1; }
.lang-option .flag  { font-size: 1.4rem; width: 28px; text-align: center; display: flex; align-items: center; }
.lang-option .flag img { width: 24px; height: 18px; border-radius: 3px; object-fit: cover; box-shadow: 0 1px 4px rgba(0,0,0,0.15); }
.lang-option .lname { flex: 1; }
.lang-option .lnative { font-size: 0.78rem; color: var(--muted); font-weight: 600; }
.globe-icon img { width: 22px; height: 16px; border-radius: 3px; object-fit: cover; box-shadow: 0 1px 4px rgba(0,0,0,0.15); }

/* ─── SCORE BAR ──────────────────────────────── */
.score-bar {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 14px;
  animation: floatIn 0.8s ease 0.15s backwards;
}
.score-pill {
  background: white;
  border-radius: 50px;
  padding: 6px 16px;
  text-align: center;
  box-shadow: 0 4px 16px var(--shadow);
}
.score-num { font-family: 'Baloo 2', cursive; font-size: 1.4rem; line-height: 1; }
.score-num.words  { color: #6366f1; }
.score-num.streak { color: #ff6b6b; }
.score-num.stars  { color: #ffd93d; }
.score-label { font-size: 0.67rem; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

/* ─── SPEECH BUBBLE ──────────────────────────── */
.speech-bubble {
  background: white;
  border-radius: 22px;
  padding: 16px 22px;
  margin-bottom: 14px;
  box-shadow: 0 6px 28px var(--shadow);
  max-width: 480px;
  width: 100%;
  position: relative;
  min-height: 58px;
  border: 3px solid #e8eaff;
  animation: floatIn 0.7s ease 0.2s backwards;
}
.speech-bubble::after {
  content: '';
  position: absolute;
  bottom: -14px;
  left: 50%;
  transform: translateX(-50%);
  border-left: 12px solid transparent;
  border-right: 12px solid transparent;
  border-top: 14px solid #e8eaff;
}
.speech-bubble::before {
  content: '';
  position: absolute;
  bottom: -9px;
  left: 50%;
  transform: translateX(-50%);
  border-left: 9px solid transparent;
  border-right: 9px solid transparent;
  border-top: 10px solid white;
  z-index: 1;
}
.bubble-text { font-size: 1rem; font-weight: 700; color: var(--text); line-height: 1.5; }

/* letter boxes */
.letter-display { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; margin-top: 12px; }
.letter-box {
  width: 44px; height: 52px;
  background: linear-gradient(135deg, #6366f1, #818cf8);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Baloo 2', cursive;
  font-size: 1.7rem; color: white;
  box-shadow: 0 4px 0 #4338ca, 0 6px 14px rgba(99,102,241,0.3);
  animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1) backwards;
  text-transform: uppercase;
}
.letter-box.space  { background: transparent; box-shadow: none; width: 14px; }
.letter-box.accent { background: linear-gradient(135deg, #ff6b6b, #ff8e8e); box-shadow: 0 4px 0 #cc4444, 0 6px 14px rgba(255,107,107,0.3); }
.letter-box.vowel  { background: linear-gradient(135deg, #ec4899, #f472b6); box-shadow: 0 4px 0 #be185d, 0 6px 14px rgba(236,72,153,0.3); }
.letter-box.special { background: linear-gradient(135deg, #f59e0b, #fbbf24); box-shadow: 0 4px 0 #b45309, 0 6px 14px rgba(245,158,11,0.3); }

/* ─── CHARACTERS STAGE ───────────────────────── */
.characters-stage {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 10px;
  margin-bottom: 6px;
  animation: floatIn 0.8s ease 0.25s backwards;
}

/* Main robot */
.bot-face {
  width: 120px; height: 120px;
  background: linear-gradient(145deg, #6366f1, #8b5cf6);
  border-radius: 30px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 0 #4338ca, 0 12px 30px rgba(99,102,241,0.4), inset 0 2px 0 rgba(255,255,255,0.2);
  animation: float 3s ease-in-out infinite;
  position: relative;
  cursor: pointer; user-select: none;
  transition: background 0.4s ease;
  flex-shrink: 0;
}
.bot-face:hover { transform: translateY(-4px) scale(1.05); }
.bot-face:active { transform: translateY(4px) scale(0.96); animation: none; }

/* Side characters */
.side-char {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  cursor: default;
  user-select: none;
}
.side-char .char-body {
  width: 64px; height: 64px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem;
  box-shadow: 0 4px 0 rgba(0,0,0,0.15), 0 6px 16px rgba(0,0,0,0.1);
  animation: float 3s ease-in-out infinite;
  flex-shrink: 0;
}
.side-char .char-name {
  font-size: 0.65rem;
  font-weight: 800;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.char-star  { background: linear-gradient(145deg, #ffd93d, #f59e0b); animation-delay: -0.8s !important; }
.char-heart { background: linear-gradient(145deg, #ff6b6b, #ec4899); animation-delay: -1.6s !important; }
.char-cloud { background: linear-gradient(145deg, #a5f3fc, #38bdf8); animation-delay: -0.4s !important; }
.char-leaf  { background: linear-gradient(145deg, #6bcb77, #22c55e); animation-delay: -2.1s !important; }

/* bot SVG internals */
.bot-svg { width: 82px; height: 82px; overflow: visible; }
.bot-antenna-stick { stroke: rgba(255,255,255,0.7); stroke-width: 2.5; stroke-linecap: round; }
.bot-antenna-ball  { fill: #fbbf24; filter: drop-shadow(0 0 3px #fbbf24); }
.bot-plate  { fill: rgba(255,255,255,0.15); }
.bot-eye-bg { fill: rgba(255,255,255,0.92); }
.bot-pupil  { fill: #312e81; }
.bot-shine  { fill: white; }
.bot-mouth        { display: none; }
.bot-mouth.active { display: block; }
.bot-blush { fill: rgba(251,113,133,0.35); }
.bot-bar   { fill: rgba(255,255,255,0.9); transform-origin: center bottom; }
.bot-bar1  { animation: barBounce 0.6s ease-in-out infinite; }
.bot-bar2  { animation: barBounce 0.6s ease-in-out infinite 0.15s; }
.bot-bar3  { animation: barBounce 0.6s ease-in-out infinite 0.3s; }
.bot-bar4  { animation: barBounce 0.6s ease-in-out infinite 0.1s; }
.bot-bar5  { animation: barBounce 0.6s ease-in-out infinite 0.25s; }
@keyframes barBounce { 0%,100%{transform:scaleY(0.3);} 50%{transform:scaleY(1);} }

.bot-face.speaking {
  background: linear-gradient(145deg, #10b981, #059669);
  box-shadow: 0 8px 0 #047857, 0 12px 30px rgba(16,185,129,0.45), inset 0 2px 0 rgba(255,255,255,0.2);
  animation: speakBounce 0.35s ease-in-out infinite alternate;
}
.bot-face.thinking {
  background: linear-gradient(145deg, #f59e0b, #d97706);
  box-shadow: 0 8px 0 #b45309, 0 12px 30px rgba(245,158,11,0.45), inset 0 2px 0 rgba(255,255,255,0.2);
  animation: spin 1.2s linear infinite;
}
.bot-face.listening {
  background: linear-gradient(145deg, #06b6d4, #0891b2);
  box-shadow: 0 8px 0 #0e7490, 0 12px 30px rgba(6,182,212,0.45), inset 0 2px 0 rgba(255,255,255,0.2);
  animation: listenPulse 1.4s ease-in-out infinite;
}
@keyframes listenPulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.07);} }

.bot-tap-hint {
  font-size: 0.72rem;
  font-weight: 800;
  color: #a5b4fc;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 12px;
  margin-bottom: 4px;
  text-align: center;
}

/* ─── AUDIO CONTROLS ─────────────────────────── */
.audio-controls { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 14px; }
.audio-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 20px; border-radius: 50px; border: none;
  font-family: 'Nunito', sans-serif;
  font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: all 0.2s;
}
.audio-btn.play  { background: linear-gradient(135deg, #4ade80, #22c55e); color: white; box-shadow: 0 4px 12px rgba(34,197,94,0.35); }
.audio-btn.spell { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: white; box-shadow: 0 4px 12px rgba(245,158,11,0.35); }
.audio-btn:hover    { transform: translateY(-2px) scale(1.04); }
.audio-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* ─── FUN FACT ────────────────────────────────── */
.fun-fact {
  margin-top: 14px;
  background: linear-gradient(135deg, #fef9c3, #fef3c7);
  border-radius: 16px; padding: 12px 16px;
  border-left: 4px solid #fbbf24;
  font-size: 0.88rem; font-weight: 600; color: #92400e;
  max-width: 480px; width: 100%; display: none;
}
.fun-fact.visible { display: block; animation: floatIn 0.4s ease; }

/* ─── STAR POP ────────────────────────────────── */
.star-pop { position: fixed; font-size: 2rem; pointer-events: none; animation: starFloat 1.2s ease forwards; z-index: 999; }

/* ─── KEYFRAMES ──────────────────────────────── */
@keyframes float       { 0%,100%{transform:translateY(0);}  50%{transform:translateY(-8px);} }
@keyframes speakBounce { from{transform:scale(1) rotate(-2deg);} to{transform:scale(1.07) rotate(2deg);} }
@keyframes spin        { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
@keyframes floatIn     { from{opacity:0;transform:translateY(16px);} to{opacity:1;transform:translateY(0);} }
@keyframes popIn       { from{opacity:0;transform:scale(0.3) rotate(-10deg);} to{opacity:1;transform:scale(1) rotate(0);} }
@keyframes starFloat   { 0%{opacity:1;transform:translateY(0) scale(1);} 100%{opacity:0;transform:translateY(-100px) scale(1.5);} }

/* ─── RESPONSIVE ─────────────────────────────── */
@media(max-width:520px) {
  .bot-face  { width:100px; height:100px; border-radius:26px; }
  .bot-svg   { width:68px; height:68px; }
  .side-char .char-body { width:52px; height:52px; font-size:1.6rem; }
  .letter-box { width:36px; height:44px; font-size:1.3rem; }
  .globe-btn { min-width: 170px; font-size: 0.85rem; }
}
@media(max-width:380px) {
  .side-char .char-body { width:44px; height:44px; font-size:1.35rem; }
  .characters-stage { gap: 6px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">🌍 WorldSpellBot</div>
  <div class="tagline">Spell in any language! ✨</div>
</header>

<!-- Language selector row -->
<div class="lang-section">
  <!-- English primary button -->
  <button class="lang-en-btn active" id="enBtn" onclick="setLang('en')">
    <img src="https://flagcdn.com/w40/gb.png" alt="GB" style="width:22px;height:16px;border-radius:3px;object-fit:cover;box-shadow:0 1px 4px rgba(0,0,0,0.15);vertical-align:middle;"> English
  </button>

  <!-- Globe dropdown for other languages -->
  <div class="globe-dropdown-wrap">
    <button class="globe-btn" id="globeBtn" onclick="toggleDropdown()">
      <span class="globe-icon" id="globeIcon">🌐</span>
      <span class="selected-lang" id="selectedLangLabel">Choose language…</span>
      <span class="arrow">▼</span>
    </button>
    <div class="lang-dropdown" id="langDropdown">
      <div class="lang-option" onclick="setLang('fr')"><span class="flag"><img src="https://flagcdn.com/w40/fr.png" alt="FR"></span><span class="lname">Français</span><span class="lnative">French</span></div>
      <div class="lang-option" onclick="setLang('de')"><span class="flag"><img src="https://flagcdn.com/w40/de.png" alt="DE"></span><span class="lname">Deutsch</span><span class="lnative">German</span></div>
      <div class="lang-option" onclick="setLang('es')"><span class="flag"><img src="https://flagcdn.com/w40/es.png" alt="ES"></span><span class="lname">Español</span><span class="lnative">Spanish</span></div>
      <div class="lang-option" onclick="setLang('ru')"><span class="flag"><img src="https://flagcdn.com/w40/ru.png" alt="RU"></span><span class="lname">Русский</span><span class="lnative">Russian</span></div>
      <div class="lang-option" onclick="setLang('it')"><span class="flag"><img src="https://flagcdn.com/w40/it.png" alt="IT"></span><span class="lname">Italiano</span><span class="lnative">Italian</span></div>
      <div class="lang-option" onclick="setLang('sr')"><span class="flag"><img src="https://flagcdn.com/w40/rs.png" alt="RS"></span><span class="lname">Српски</span><span class="lnative">Serbian</span></div>
      <div class="lang-option" onclick="setLang('zh')"><span class="flag"><img src="https://flagcdn.com/w40/cn.png" alt="CN"></span><span class="lname">中文</span><span class="lnative">Mandarin</span></div>
    </div>
  </div>
</div>

<!-- Score pills -->
<div class="score-bar">
  <div class="score-pill"><div class="score-num words" id="scoreWords">0</div><div class="score-label">Words</div></div>
  <div class="score-pill"><div class="score-num streak" id="scoreStreak">0</div><div class="score-label">Streak 🔥</div></div>
  <div class="score-pill"><div class="score-num stars" id="scoreStars">⭐</div></div>
</div>

<!-- Speech bubble -->
<div class="speech-bubble">
  <div class="bubble-text" id="bubbleText">Hi! Tap me and say a word! 😊</div>
  <div class="letter-display" id="letterDisplay"></div>
</div>

<!-- Characters stage -->
<div class="characters-stage">
  <!-- Left side characters -->
  <div class="side-char">
    <div class="char-body char-star">⭐</div>
    <div class="char-name">Zara</div>
  </div>
  <div class="side-char">
    <div class="char-body char-heart">💖</div>
    <div class="char-name">Ruby</div>
  </div>

  <!-- Main bot -->
  <div style="display:flex;flex-direction:column;align-items:center;">
    <div class="bot-face" id="botFace" onclick="toggleMic()" role="button" tabindex="0" title="Tap to speak">
      <svg class="bot-svg" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <line class="bot-antenna-stick" x1="40" y1="4" x2="40" y2="14"/>
        <circle class="bot-antenna-ball" cx="40" cy="3" r="3.5"/>
        <rect class="bot-plate" x="12" y="14" width="56" height="52" rx="12" ry="12"/>
        <circle class="bot-eye-bg" cx="28" cy="34" r="9"/>
        <circle class="bot-eye-bg" cx="52" cy="34" r="9"/>
        <circle class="bot-pupil" id="pupilL" cx="28" cy="35" r="5"/>
        <circle class="bot-pupil" id="pupilR" cx="52" cy="35" r="5"/>
        <circle class="bot-shine" cx="30" cy="32" r="2"/>
        <circle class="bot-shine" cx="54" cy="32" r="2"/>
        <ellipse class="bot-blush" cx="19" cy="44" rx="5" ry="3"/>
        <ellipse class="bot-blush" cx="61" cy="44" rx="5" ry="3"/>
        <path id="mouth-idle" class="bot-mouth active" d="M28 52 Q40 62 52 52"
          fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="3" stroke-linecap="round"/>
        <g id="mouth-speaking" class="bot-mouth">
          <path id="mouth-upper" d="M28 50 Q40 46 52 50" fill="none" stroke="rgba(255,255,255,0.95)" stroke-width="2.5" stroke-linecap="round"/>
          <path id="mouth-lower" d="M28 50 Q40 58 52 50" fill="rgba(0,0,0,0.25)" stroke="rgba(255,255,255,0.95)" stroke-width="2.5" stroke-linecap="round"/>
          <ellipse id="mouth-tongue" cx="40" cy="56" rx="5" ry="2.5" fill="#fb7185" opacity="0"/>
        </g>
        <line id="mouth-thinking" class="bot-mouth" x1="29" y1="54" x2="51" y2="54"
          stroke="rgba(255,255,255,0.7)" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="3 4"/>
        <g id="mouth-listening" class="bot-mouth">

// ── AI Agent: enriches any unknown word via Claude API ───────────
const wordCache = {};

function wordFallback(word, lang) {
  const letters = word.toUpperCase().split('').join('-');
  const cfg = LANG_CONFIG[lang];
  const factMap = { en:'Great word!', fr:'Super mot!', de:'Tolles Wort!', es:'¡Gran palabra!', ru:'Отличное слово!', it:'Ottima parola!', sr:'Одлична реч!', zh:'很棒的词！' };
  return { word, msg: `${letters}! 🌟`, fact: factMap[lang] || 'Great word!' };
}

// ── Serbian Latin → Cyrillic transliteration ────────────────────
const SR_LAT_TO_CYR = {
  'lj':'љ','nj':'њ','dž':'џ','dj':'ђ','Lj':'Љ','Nj':'Њ','Dž':'Џ','Dj':'Ђ',
  'a':'а','b':'б','c':'ц','č':'ч','ć':'ћ','d':'д','đ':'ђ','e':'е','f':'ф',
  'g':'г','h':'х','i':'и','j':'ј','k':'к','l':'л','m':'м','n':'н','o':'о',
  'p':'п','r':'р','s':'с','š':'ш','t':'т','u':'у','v':'в','z':'з','ž':'ж',
  'A':'А','B':'Б','C':'Ц','Č':'Ч','Ć':'Ћ','D':'Д','Đ':'Ђ','E':'Е','F':'Ф',
  'G':'Г','H':'Х','I':'И','J':'Ј','K':'К','L':'Л','M':'М','N':'Н','O':'О',
  'P':'П','R':'Р','S':'С','Š':'Ш','T':'Т','U':'У','V':'В','Z':'З','Ž':'Ж',
};

function srLatinToCyrillic(text) {
  // Handle digraphs first (lj, nj, dž, dj)
  let result = text
    .replace(/lj/gi, m => m[0] === m[0].toUpperCase() ? 'Љ' : 'љ')
    .replace(/nj/gi, m => m[0] === m[0].toUpperCase() ? 'Њ' : 'њ')
    .replace(/dž/gi, m => m[0] === m[0].toUpperCase() ? 'Џ' : 'џ')
    .replace(/dj/gi, m => m[0] === m[0].toUpperCase() ? 'Ђ' : 'ђ');
  // Then single chars
  return result.split('').map(ch => SR_LAT_TO_CYR[ch] || ch).join('');
}

function getWordData(word, lang) {
  const key = word.toLowerCase().trim();
  const cacheKey = key + '|' + lang;
  if (wordCache[cacheKey]) return wordCache[cacheKey];
  const data = WORD_DATA[lang];
  if (data && data[key]) return { word: key, ...data[key] };
  // Chinese: try direct lookup
  if (lang === 'zh' && data && data[word]) return { word, ...data[word] };
  // Serbian: if voice returned Latin, convert to Cyrillic and try again
  if (lang === 'sr') {
    const cyr = srLatinToCyrillic(key);
    if (data && data[cyr]) return { word: cyr, ...data[cyr] };
    // Also try original capitalised Cyrillic key
    const cyrOrig = srLatinToCyrillic(word.trim());
    if (data && data[cyrOrig]) return { word: cyrOrig, ...data[cyrOrig] };
  }
  return wordFallback(lang === 'sr' ? srLatinToCyrillic(key) : key, lang);
}

function enrichWordAsync(word, lang) {
  // For Serbian, always work in Cyrillic
  const actualWord = lang === 'sr' ? srLatinToCyrillic(word.trim()) : word;
  const key = lang === 'sr' ? actualWord : actualWord.toLowerCase().trim();
  const cacheKey = key + '|' + lang;
  if (wordCache[cacheKey]) return;
  const data = WORD_DATA[lang];
  if (data && (data[key] || data[actualWord])) return;
  if (!ANTHROPIC_API_KEY || ANTHROPIC_API_KEY === 'YOUR_API_KEY') return;

  const cfg = LANG_CONFIG[lang];
  const systemPrompt = `You are a spelling teacher for young children. 
The user says a word in ${cfg.name}. 
Return ONLY valid JSON (no markdown, no backticks):
{"word":"<correct ${cfg.name} spelling>","msg":"<hyphenated letters with spaces like C-A-T! + 1 emoji + short note>","fact":"<super fun kid fact about the word in ${cfg.name}, max 10 words>"}
For non-Latin scripts (Russian, Serbian, Chinese) use the actual script letters separated by hyphens.`;

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': ANTHROPIC_API_KEY,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 200,
      system: systemPrompt,
      messages: [{ role: 'user', content: word }]
    })
  })
  .then(r => r.ok ? r.json() : null)
  .then(data => {
    if (!data) return;
    const raw = (data.content?.[0]?.text || '').replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(raw);
    const result = {
      word:  (parsed.word || word).trim(),
      msg:   parsed.msg  || wordFallback(word, lang).msg,
      fact:  parsed.fact || wordFallback(word, lang).fact,
    };
    wordCache[cacheKey] = result;
    const wk = result.word.toLowerCase();
    if (currentWord === key || currentWord === wk) {
      document.getElementById('funFact').textContent   = '💡 ' + result.fact;
      document.getElementById('bubbleText').textContent = result.msg;
      showLetters(result.word, lang);
      currentWord = result.word;
    }
  }).catch(() => {});
}

// ── NLU: strip filler words and extract the target word ──────────
const STRIP_PATTERNS = [
  /^(hey\s+)?(world\s*spell\s*bot|worldspellbot|spell\s*bot|spellbot)[,\s]*/i,
  /(can\s+you|could\s+you|please|will\s+you)/gi,
  /(how\s+(do\s+you|to|do\s+i)\s+spell)/gi,
  /(spell\s+out|spell\s+the\s+word|spell)/gi,
  /(what\s+is\s+the\s+spelling\s+of|spelling\s+of)/gi,
  /(teach\s+me|show\s+me|tell\s+me|help\s+me)/gi,
  /(the\s+word|a\s+word|word)/gi,
  /(what\s+is|what's|how\s+is)/gi,
  /(hey|hi|hello|ok|okay|um+|uh+|er+)\b/gi,
  /[?!.,]/g,
];

function parseTranscript(t) {
  let text = t.toLowerCase().trim();
  for (const p of STRIP_PATTERNS) text = text.replace(p, ' ');
  text = text.replace(/\s+/, ' ').trim();
  const words = text.split(' ').filter(w => w.length >= 1);
  if (!words.length) return null;
  return words[words.length - 1];
}

function handleVoiceInput(transcript) {
  // For CJK languages, use the transcript more directly
  if (currentLang === 'zh' || currentLang === 'ru' || currentLang === 'sr') {
    const trimmed = transcript.trim();
    if (trimmed) { doSpell(trimmed); return; }
  }
  const word = parseTranscript(transcript);
  if (!word) {
    const msgs = { en: 'Which word? 😅', fr: 'Quel mot? 😅', de: 'Welches Wort? 😅', es: '¿Qué palabra? 😅', ru: 'Какое слово? 😅', it: 'Quale parola? 😅', sr: 'Која реч? 😅', zh: '哪个词？😅' };
    setBubble(msgs[currentLang] || 'Which word? 😅');
    return;
  }
  doSpell(word);
}

// ── Core spell ───────────────────────────────────────────────────
function doSpell(word) {
  if (!word) return;
  cancelSpeech();
  stopMic();

  const data = getWordData(word.toLowerCase().trim(), currentLang);
  currentWord = data.word;

  setBotState('thinking');
  const cfg = LANG_CONFIG[currentLang];
  setBubble(cfg.thinking);
  clearLetters();
  document.getElementById('funFact').classList.remove('visible');

  // iOS needs extra time for mic audio session to close before TTS can open
  const delay = isIOS ? 1000 : 400;

  setTimeout(() => {
    setBotState('speaking');
    setBubble(data.msg);
    showLetters(data.word, currentLang);
    document.getElementById('funFact').textContent = '💡 ' + data.fact;
    document.getElementById('funFact').classList.add('visible');
    document.getElementById('readBtn').disabled      = false;
    document.getElementById('spellAloudBtn').disabled = false;
    scores.words++;
    scores.streak++;
    if (scores.words % 3 === 0) { scores.stars++; popStar(); }
    updateScore();
    enrichWordAsync(data.word, currentLang);
    spellAloudThen(() => setBotState(''));
  }, delay);
}

// ── Language switch — always FULL RESET ─────────────────────────
function setLang(lang) {
  cancelSpeech();
  stopMic();
  currentLang = lang;
  currentWord  = '';

  // Update EN button active state
  const enBtn = document.getElementById('enBtn');
  enBtn.classList.toggle('active', lang === 'en');

  // Update globe button label and icon
  const cfg = LANG_CONFIG[lang];
  const label = document.getElementById('selectedLangLabel');
  const globeIcon = document.getElementById('globeIcon');
  const globeBtn = document.getElementById('globeBtn');
  if (lang === 'en') {
    label.textContent = 'Choose language…';
    globeIcon.innerHTML = '🌐';
    globeBtn.style.borderColor = '';
  } else {
    label.textContent = cfg.name;
    globeIcon.innerHTML = `<img src="${cfg.flagImg}" alt="${lang.toUpperCase()}">`;
    globeBtn.style.borderColor = '#c77dff';
    // mark dropdown option
    document.querySelectorAll('.lang-option').forEach(opt => {
      opt.classList.toggle('selected', opt.querySelector('.lname')?.textContent === cfg.name);
    });
  }

  closeDropdown();

  // Full reset
  clearLetters();
  document.getElementById('funFact').classList.remove('visible');
  document.getElementById('funFact').textContent = '';
  document.getElementById('readBtn').disabled      = true;
  document.getElementById('spellAloudBtn').disabled = true;
  document.getElementById('readBtn').textContent       = cfg.readBtn;
  document.getElementById('spellAloudBtn').textContent  = cfg.spellAloud;

  setBotState('');
  setBubble(cfg.greeting);

  // Update scores label language
  updateScore();
}

  const dd  = document.getElementById('langDropdown');
  const btn = document.getElementById('globeBtn');

  btn.classList.toggle('open', open);
}

  document.getElementById('langDropdown').classList.remove('open');
  document.getElementById('globeBtn').classList.remove('open');

document.addEventListener('click', e => {
  if (!e.target.closest('.globe-dropdown-wrap')) closeDropdown();
});

// ── Letter display ────────────────────────────────────────────────
function showLetters(word, lang) {
  const container = document.getElementById('letterDisplay');
  container.innerHTML = '';
  const isCJK = lang === 'zh';

  word.split('').forEach((ch, i) => {
    const box = document.createElement('div');
    if (ch === ' ') {
      box.className = 'letter-box space';
    } else {
      const lower = ch.toLowerCase();
      const isCyrillic = /[\u0400-\u04FF]/.test(ch);
      const isChinese  = /[\u4E00-\u9FFF]/.test(ch);
      const isAccent   = /[àáâãäåæçèéêëìíîïòóôõöùúûüýéčšžđćž]/i.test(ch);
      const isVowel    = VOWELS.has(lower) && !isAccent;

      if (isChinese)        box.className = 'letter-box special';
      else if (isCyrillic)  box.className = 'letter-box';
      else if (isAccent)    box.className = 'letter-box accent';
      else if (isVowel)     box.className = 'letter-box vowel';
      else                  box.className = 'letter-box';

      box.textContent = isCJK ? ch : ch.toUpperCase();
      if (isChinese) box.style.fontSize = '1.35rem';
      box.style.animationDelay = (i * 0.07) + 's';
    }
    container.appendChild(box);
  });
}

function clearLetters() {
  document.getElementById('letterDisplay').innerHTML = '';
}

// ── Score ─────────────────────────────────────────────────────────
function updateScore() {
  document.getElementById('scoreWords').textContent  = scores.words;
  document.getElementById('scoreStreak').textContent = scores.streak;
  document.getElementById('scoreStars').textContent  = '⭐'.repeat(Math.min(scores.stars, 5)) || '⭐';
}

function popStar() {
  const el = document.createElement('div');
  el.className = 'star-pop';
  el.textContent = '⭐';
  el.style.left = (30 + Math.random() * 40) + 'vw';
  el.style.top  = '40vh';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1300);
}

// ── Bot state ─────────────────────────────────────────────────────
function setBubble(text) {
  document.getElementById('bubbleText').textContent = text;
}

function setBotState(state) {
  const bot = document.getElementById('botFace');
  bot.className = 'bot-face' + (state ? ' ' + state : '');
  const map = { '': 'mouth-idle', speaking: 'mouth-speaking', thinking: 'mouth-thinking', listening: 'mouth-listening' };
  ['mouth-idle','mouth-speaking','mouth-thinking','mouth-listening'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.className = 'bot-mouth' + (id === map[state || ''] ? ' active' : '');
  });
  const pL = document.getElementById('pupilL');
  const pR = document.getElementById('pupilR');
  if (pL && pR) {
    const cy = state === 'thinking' ? '33' : state === 'listening' ? '36' : '35';
    pL.setAttribute('cy', cy); pR.setAttribute('cy', cy);
  }
  if (state !== 'speaking') stopMouthTalk();
  const hint = document.getElementById('tapHint');
  if (hint) hint.style.opacity = (!state || state === '') ? '1' : '0';
}

// ── Mouth animation ───────────────────────────────────────────────
let mouthTimer = null, mouthOpen = false;
function startMouthTalk() {
  if (mouthTimer) return;
  mouthTimer = setInterval(() => {
    mouthOpen = !mouthOpen;
    const lower  = document.getElementById('mouth-lower');
    const tongue = document.getElementById('mouth-tongue');
    if (lower)  lower.setAttribute('d', mouthOpen ? 'M28 50 Q40 64 52 50' : 'M28 50 Q40 58 52 50');
    if (tongue) tongue.setAttribute('opacity', mouthOpen ? '0.9' : '0');
  }, 180);
}
function stopMouthTalk() {
  if (mouthTimer) { clearInterval(mouthTimer); mouthTimer = null; }
  const lower  = document.getElementById('mouth-lower');
  const tongue = document.getElementById('mouth-tongue');
  if (lower)  lower.setAttribute('d', 'M28 50 Q40 58 52 50');
  if (tongue) tongue.setAttribute('opacity', '0');
}

// ── TTS ───────────────────────────────────────────────────────────
const synth = window.speechSynthesis;
let preferredVoice = {};

function loadVoices() {
  if (!synth) return;
  const all = synth.getVoices();
  if (!all.length) return;
  const rank = v => (/natural|enhanced|premium/i.test(v.name) ? 10 : 0) + (/google/i.test(v.name) ? 5 : 0);
  Object.keys(LANG_CONFIG).forEach(lang => {
    const tts  = LANG_CONFIG[lang].tts;
    const base = tts.split('-')[0];
    preferredVoice[lang] = all
      .filter(v => v.lang.startsWith(base))
      .sort((a, b) => rank(b) - rank(a))[0] || null;
  });
  // Serbian fallback: if no sr voice found, use Russian (Slavic, same Cyrillic sounds)
  if (!preferredVoice['sr']) {
    preferredVoice['sr'] = preferredVoice['ru'] || null;
  }
}
if (synth) { synth.onvoiceschanged = loadVoices; loadVoices(); }

function cancelSpeech() {
  if (!synth) return;
  synth.cancel();
  stopMouthTalk();
}

function speak(text, lang, rate, pitch, onDone) {
  if (!synth) { if (onDone) onDone(); return; }
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang  = LANG_CONFIG[lang]?.tts || 'en-US';
  utt.rate  = rate  || 0.88;
  utt.pitch = pitch || 1.1;
  // Use exact language voice — Serbian falls back to Russian in loadVoices()
  // Never use English voice for non-English languages
  const v = preferredVoice[lang];
  if (v) {
    utt.voice = v;
    // If using Russian voice for Serbian, keep lang hint as sr-RS for correct phonemes
    if (lang === 'sr' && v.lang.startsWith('ru')) utt.lang = 'ru-RU';
  }
  let finished = false;
  const finish = () => {
    if (finished) return; finished = true;
    stopMouthTalk(); if (onDone) onDone();
  };
  utt.onstart = () => startMouthTalk();
  utt.onend   = finish;
  utt.onerror = e => { if (e.error !== 'interrupted') console.warn('TTS:', e.error); finish(); };
  synth.speak(utt);
  setTimeout(finish, Math.max(3000, text.length * 150));
}

function readWord() {
  if (!currentWord || !synth) return;
  cancelSpeech();
  setBotState('speaking');
  setTimeout(() => speak(currentWord, currentLang, 0.82, 1.1, () => setBotState('')), 50);
}

// ── Serbian Cyrillic letter phonetic helpers ─────────────────────
// Map each Cyrillic letter to a short Serbian word starting with that sound
// This forces the TTS to say the correct Serbian phoneme, not English letter names
const SR_LETTER_PHONETICS = {
  'А':'а', 'Б':'бе', 'В':'ве', 'Г':'ге', 'Д':'де',
  'Ђ':'ђе', 'Е':'е', 'Ж':'же', 'З':'зе', 'И':'и',
  'Ј':'је', 'К':'ке', 'Л':'ле', 'Љ':'ље', 'М':'ме',
  'Н':'не', 'Њ':'ње', 'О':'о', 'П':'пе', 'Р':'ре',
  'С':'се', 'Т':'те', 'Ћ':'ће', 'У':'у', 'Ф':'фе',
  'Х':'хе', 'Ц':'це', 'Ч':'че', 'Џ':'џе', 'Ш':'ше',
};

function srLetterSound(letter) {
  return SR_LETTER_PHONETICS[letter.toUpperCase()] || letter;
}

// ── Per-language letter name pronunciations ──────────────────────
// Each language spells letters using its OWN letter names, not English
const LETTER_NAMES = {
  fr: { // French letter names
    'a':'a','b':'bé','c':'cé','d':'dé','e':'e','f':'effe','g':'gé',
    'h':'ache','i':'i','j':'ji','k':'ka','l':'elle','m':'emme',
    'n':'enne','o':'o','p':'pé','q':'ku','r':'erre','s':'esse',
    't':'té','u':'u','v':'vé','w':'double vé','x':'iks','y':'i grec','z':'zède',
    'é':'é','è':'è','ê':'ê','à':'à','â':'â','î':'î','ô':'ô','û':'û','ç':'cé cédille',
  },
  de: { // German letter names
    'a':'a','b':'bé','c':'tsé','d':'dé','e':'e','f':'eff','g':'gé',
    'h':'ha','i':'i','j':'jot','k':'ka','l':'ell','m':'em',
    'n':'en','o':'o','p':'pé','q':'ku','r':'err','s':'ess',
    't':'té','u':'u','v':'fau','w':'vé','x':'iks','y':'üpsilon','z':'tsett',
    'ä':'ä','ö':'ö','ü':'ü','ß':'ess-tsett',
  },
  es: { // Spanish letter names
    'a':'a','b':'be','c':'ce','d':'de','e':'e','f':'efe','g':'ge',
    'h':'hache','i':'i','j':'jota','k':'ka','l':'ele','m':'eme',
    'n':'ene','o':'o','p':'pe','q':'cu','r':'erre','s':'ese',
    't':'te','u':'u','v':'uve','w':'uve doble','x':'equis','y':'ye','z':'zeta',
    'ñ':'eñe','á':'a con acento','é':'e con acento','í':'i con acento',
    'ó':'o con acento','ú':'u con acento','ü':'u con diéresis',
  },
  it: { // Italian letter names
    'a':'a','b':'bi','c':'ci','d':'di','e':'e','f':'effe','g':'gi',
    'h':'acca','i':'i','j':'i lunga','k':'cappa','l':'elle','m':'emme',
    'n':'enne','o':'o','p':'pi','q':'cu','r':'erre','s':'esse',
    't':'ti','u':'u','v':'vu','w':'doppia vu','x':'ics','y':'ipsilon','z':'zeta',
  },
};

function getLetterName(letter, lang) {
  const map = LETTER_NAMES[lang];
  if (!map) return letter;
  return map[letter.toLowerCase()] || letter;
}

function spellAloudThen(onDone) {
  if (!currentWord || !synth) { if (onDone) onDone(); return; }
  loadVoices();
  cancelSpeech();
  setBotState('speaking');
  const word      = currentWord;
  const isSr      = currentLang === 'sr';
  const isRu      = currentLang === 'ru';
  const isChinese = currentLang === 'zh';
  const hasLetterNames = LETTER_NAMES[currentLang];

  let items;
  let gap = 300;

  if (isChinese) {
    // Chinese: say whole word twice slowly
    items = [
      { text: word, rate: 0.75 },
      { text: word, rate: 0.60 },
    ];
    gap = 400;
  } else if (isSr) {
    // Serbian: perfectly phonetic — each letter IS its sound
    const letters = word.replace(/ /g, '').split('');
    items = [
      { text: word, rate: 0.78 },
      ...letters.map(l => ({ text: l, rate: 0.45 })),
      { text: word, rate: 0.78 },
    ];
    gap = 450;
  } else if (isRu) {
    // Russian: Cyrillic, let Russian TTS pronounce each letter
    const letters = word.replace(/ /g, '').split('');
    items = [
      { text: word, rate: 0.80 },
      ...letters.map(l => ({ text: l, rate: 0.55 })),
      { text: word, rate: 0.78 },
    ];
    gap = 380;
  } else if (hasLetterNames) {
    // French, German, Spanish, Italian — use native letter names
    const letters = word.replace(/ /g, '').split('');
    items = [
      { text: word, rate: 0.80 },
      ...letters.map(l => ({ text: getLetterName(l, currentLang), rate: 0.70 })),
      { text: word, rate: 0.78 },
    ];
    gap = 320;
  } else {
    // English and others — standard letter by letter
    const letters = word.replace(/ /g, '').split('');
    items = [
      { text: word, rate: 0.82 },
      ...letters.map(l => ({ text: l, rate: 0.72 })),
      { text: word, rate: 0.78 },
    ];
    gap = 280;
  }

  let idx = 0;
  function next() {
    if (idx >= items.length) { setBotState(''); if (onDone) onDone(); return; }
    const { text, rate } = items[idx++];
    const g = idx === 1 ? (isIOS ? 600 : 0) : gap;
    setTimeout(() => speak(text, currentLang, rate, 1.05, next), g);
  }
  setTimeout(next, isIOS ? 400 : 80);
}

function spellAloud() { spellAloudThen(() => setBotState('')); }

// ── Detect iOS ────────────────────────────────────────────────────
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
              (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

// iOS doesn't support Serbian or some other langs — map to closest supported
const IOS_LANG_FALLBACK = {
  'sr': 'hr-HR', // Croatian is closest to Serbian on iOS
  'zh': 'zh-CN',
};

function getMicLang(lang) {
  if (isIOS && IOS_LANG_FALLBACK[lang]) return IOS_LANG_FALLBACK[lang];
  return LANG_CONFIG[lang].tts;
}

// ── Mic ───────────────────────────────────────────────────────────
let recognition = null;
let micRestartTimer = null;

function stopMic() {
  if (micRestartTimer) { clearTimeout(micRestartTimer); micRestartTimer = null; }
  if (recognition) { try { recognition.abort(); } catch(e) {} recognition = null; }
}

function toggleMic() {
  if (recognition) {
    stopMic(); setBotState('');
    setBubble(LANG_CONFIG[currentLang].greeting);
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    setBubble('😕 Voice not supported. Try Chrome or Safari.');
    return;
  }
  cancelSpeech();
  setBotState('listening');

  // Show iOS-specific hint for Serbian since it falls back to Croatian recognition
  if (isIOS && currentLang === 'sr') {
    setBubble('🎤 Говори реч! (iOS: изговори латиницом)');
  } else {
    setBubble(LANG_CONFIG[currentLang].listening);
  }

  recognition = new SR();
  recognition.lang           = getMicLang(currentLang);
  recognition.continuous     = false;
  recognition.interimResults = false;
  recognition.maxAlternatives = isIOS ? 5 : 3;

  let resultFired = false;

  recognition.onresult = e => {
    resultFired = true;
    // On iOS take the best alternative
    let transcript = '';
    for (let i = 0; i < e.results[0].length; i++) {
      transcript = e.results[0][i].transcript.trim();
      if (transcript.length > 0) break;
    }
    stopMic();
    setBotState('thinking');
    // iOS needs longer delay — mic session must fully close before TTS opens
    const delay = isIOS ? 900 : 200;
    setTimeout(() => handleVoiceInput(transcript), delay);
  };

  recognition.onerror = e => {
    if (e.error === 'aborted') return;
    stopMic(); setBotState('');
    const msgs = {
      'not-allowed':   '🔒 Mic blocked. Allow microphone in settings.',
      'no-speech':     isIOS ? '🎤 Tap again and speak clearly!' : LANG_CONFIG[currentLang].greeting.replace('!','') + '... try again! 😊',
      'audio-capture': '🎤 No microphone found.',
      'network':       '📡 Network error — check connection.',
    };
    setBubble(msgs[e.error] || ('Error: ' + e.error));
  };

  recognition.onend = () => {
    if (!resultFired) {
      stopMic(); setBotState('');
      const cur = document.getElementById('bubbleText').textContent;
      const listeningPhrases = ['Listening','écoute','höre','Слушаю','Слушам','听','Говори','Escuchando','Ascolto'];
      if (listeningPhrases.some(p => cur.includes(p))) {
        setBubble(LANG_CONFIG[currentLang].greeting);
      }
    }
  };

  try {
    recognition.start();
    // iOS kills mic after ~5s silence — show tap-again hint
    if (isIOS) {
      micRestartTimer = setTimeout(() => {
        if (recognition) {
          setBubble(LANG_CONFIG[currentLang].greeting);
          stopMic(); setBotState('');
        }
      }, 6000);
    }
  }
  catch(e) { stopMic(); setBotState(''); setBubble('Could not start mic: ' + e.message); }
}

// ── Init ──────────────────────────────────────────────────────────
document.getElementById('botFace').addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') toggleMic();
});

// ── iOS Audio Unlock ──────────────────────────────────────────────
// iOS blocks ALL audio until first user tap — speak a silent utterance
// on first interaction to unlock the audio session
let iosAudioUnlocked = false;
function unlockIOSAudio() {
  if (!isIOS || iosAudioUnlocked || !synth) return;
  const utt = new SpeechSynthesisUtterance(' ');
  utt.volume = 0;
  utt.rate   = 2;
  synth.speak(utt);
  iosAudioUnlocked = true;
}

// Call unlock on any first touch anywhere on page (iOS)
if (isIOS) {
  document.addEventListener('touchstart', function onFirstTouch() {
    unlockIOSAudio();
    document.removeEventListener('touchstart', onFirstTouch);
  }, { once: true });
}

setBotState('');
setBubble(LANG_CONFIG[currentLang].greeting);
updateScore();
</script>
